<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f11" />

  <!-- Primary Meta Tags -->
  <title>AI Vision Studio</title>
  <meta name="title" content="AI Vision Studio" />
  <meta name="description"
    content="A professional-grade AI creation suite for generating high-fidelity images and videos using Google Gemini and Veo models. Experience the future of creativity." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ai-vision-studio.pages.dev/" />
  <meta property="og:title" content="AI Vision Studio" />
  <meta property="og:description"
    content="Generate stunning 4K images and cinematic videos with Google's latest Gemini & Veo AI models. Professional controls, zero latency." />
  <meta property="og:image"
    content="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://ai-vision-studio.pages.dev/" />
  <meta property="twitter:title" content="AI Vision Studio" />
  <meta property="twitter:description"
    content="Generate stunning 4K images and cinematic videos with Google's latest Gemini & Veo AI models." />
  <meta property="twitter:image"
    content="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg" />

  <!-- PWA -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon"
    href="https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#ecfeff',
              100: '#cffafe',
              400: '#22d3ee',
              500: '#06b6d4',
              600: '#0891b2',
              900: '#164e63',
            },
            dark: {
              bg: '#09090b',
              panel: '#18181b',
              surface: '#27272a',
              border: '#3f3f46'
            }
          },
          boxShadow: {
            'glow': '0 0 15px rgba(6, 182, 212, 0.3)',
            'glow-focus': '0 0 0 2px #06b6d4, 0 0 20px rgba(6, 182, 212, 0.4)'
          },
          fontFamily: {
            sans: ['Outfit', 'Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --glass-bg: rgba(28, 28, 33, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    body { background-color: #09090b; color: #e4e4e7; overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #06b6d4;
    }

    .smooth-transition {
      transition: all 250ms ease-in-out;
    }

    .hover-lift {
      transition: transform 250ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 250ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(39, 39, 42, 0.8);
    }

    /* AUDIT #4: Global cursor-pointer for interactive elements */
    button, [role="button"], [onclick] {
      cursor: pointer;
    }

    /* AUDIT #1: prefers-reduced-motion accessibility */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* AUDIT #7: Generation state glow pulse */
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.05); border-color: rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.4), inset 0 0 15px rgba(6, 182, 212, 0.1); border-color: rgba(6, 182, 212, 0.5); }
    }
    .glow-pulse {
      animation: glow-pulse 2s ease-in-out infinite;
    }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in {
      animation: fade-in 0.3s ease-out forwards;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^18.2.0",
    "react-dom/": "https://esm.sh/react-dom@^18.2.0/",
    "react/": "https://esm.sh/react@^18.2.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.0.0",
    "@ai-sdk/google": "https://esm.sh/@ai-sdk/google@^1.1.9",
    "ai": "https://esm.sh/ai@^4.1.17",
    "zod": "https://esm.sh/zod@^3.24.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.344.0",
    "react-markdown": "https://esm.sh/react-markdown@^10.1.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
